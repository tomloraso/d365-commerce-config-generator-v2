name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "D365CommerceConfigGenerator"
          --collect-all ttkbootstrap
          main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: D365CommerceConfigGenerator-windows
          path: dist/D365CommerceConfigGenerator.exe
          retention-days: 30

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes 2>$null; exit 0

      - name: Create latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create latest
          dist/D365CommerceConfigGenerator.exe
          --title "Latest Build"
          --notes "Latest Windows build from main branch."
          --latest
